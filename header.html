<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Lateral Personalizado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Variáveis com a sua paleta de cores */
        :root {
            --azul-escuro: #4F6DD1;
            --azul-medio: #6A85DD;
            --azul-principal: #859CE8;
            --azul-claro: #9FB4F4;
            --azul-fundo: #BACBFF;
        }

        body {
            background-color: #f4f6fc; /* Fundo suave para contrastar */
        }

        /* Estilização da Sidebar */
        .sidebar {
            min-height: 100vh;
            background-color: var(--azul-escuro) !important;
            box-shadow: 3px 0 10px rgba(79, 109, 209, 0.15);
        }

        /* Links do Menu */
        .sidebar .nav-link {
            color: #ffffff !important;
            transition: all 0.2s ease;
            border-radius: 8px;
            margin: 2px 0;
        }

        /* Link Ativo */
        .sidebar .nav-link.active {
            background-color: var(--azul-medio) !important;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Efeito de Hover nos links */
        .sidebar .nav-link:hover:not(.active) {
            background-color: var(--azul-claro) !important;
            color: var(--azul-escuro) !important;
        }

        /* Linha divisória */
        .sidebar hr {
            background-color: var(--azul-claro);
            opacity: 0.3;
        }

        /* Customização de botões no conteúdo para combinar */
        .btn-custom {
            background-color: var(--azul-escuro);
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: var(--azul-medio);
            color: white;
        }

        /* Card do exemplo */
        .card-preview {
            border-top: 4px solid var(--azul-principal);
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        
        <nav class="col-md-3 col-lg-2 d-md-block sidebar px-3 pt-3">
            <div class="position-sticky d-flex flex-column justify-content-between h-100">
                <div>
                    <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none px-2">
                        <i class="bi bi-grid-1x2-fill fs-4 me-2"></i>
                        <span class="fs-4 fw-bold">Painel Azul</span>
                    </a>
                    <hr>
                    
                    <ul class="nav nav-pills flex-column mb-auto">
                        <li class="nav-item">
                            <a href="#" class="nav-link active">
                                <i class="bi bi-house-door me-2"></i> Visão Geral
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link">
                                <i class="bi bi-wallet2 me-2"></i> Financeiro
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link">
                                <i class="bi bi-pie-chart me-2"></i> Analítico
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link">
                                <i class="bi bi-shield-check me-2"></i> Segurança
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="pb-4">
                    <hr>
                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle px-2" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="bg-white rounded-circle text-dark d-flex align-items-center justify-content-center me-2" style="width:32px; height:32px; font-weight: bold; background-color: var(--azul-fundo) !important;">
                                U
                            </div>
                            <strong>Usuário</strong>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark shadow" aria-labelledby="dropdownUser">

                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
